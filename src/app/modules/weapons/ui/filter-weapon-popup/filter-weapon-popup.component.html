@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" (click)="closePopup.emit()">
    <div class="bg-[#1f2937] border border-[#334d6c] text-white rounded-xl max-w-[600px] w-full max-h-[80vh] flex flex-col overflow-hidden" (click)="$event.stopPropagation()">
      <div class="p-4 border-b border-[#1a3759]">
        <h2 class="text-2xl font-bold text-center">Filter</h2>
      </div>
      <div class="p-5 overflow-y-auto space-y-6">
        <div>
          <span class="font-semibold block mb-2">Rarity</span>
          <div class="flex gap-2 flex-wrap">
            @for (r of rarities; track r.code) {
              <button (click)="toggleRarity(r.code)" [class]="'px-4 py-2 rounded border text-sm ' + (isActiveRarity(r.code) ? 'bg-[#4d647e] border-[#4d647e]' : 'bg-[#334d6c] border-[#334d6c]')">
                <span class="text-yellow-300">{{ r.label }}</span>
              </button>
            }
          </div>
        </div>
        <div>
          <span class="font-semibold block mb-2">Weapon Type</span>
          <div class="flex gap-2 flex-wrap">
            @for (wp of weaponTypes; track wp.code) {
              <button (click)="toggleType(wp.code)" [class]="'w-[60px] h-[40px] flex items-center justify-center rounded border ' + (isActiveType(wp.code) ? 'bg-[#4d647e] border-[#4d647e]' : 'bg-[#334d6c] border-[#334d6c]')">
                <img [src]="wp.icon" width="24" height="24" alt="weapon" />
              </button>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
}
