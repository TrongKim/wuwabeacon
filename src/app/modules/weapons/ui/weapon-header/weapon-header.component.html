<div class="mb-6">
  <h1 class="text-2xl font-bold mb-4">Archive / Weapons</h1>
  <div class="flex flex-col sm:flex-row gap-3">
    <button (click)="isFilterOpen.set(true)" class="flex gap-2 items-center px-4 py-2 bg-slate-800 border border-slate-700 rounded-md hover:bg-slate-700 text-white cursor-pointer">
      <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none">
        <path d="M3 6H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M6 12H18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 18H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Filter
    </button>
    <div class="flex-1 relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" placeholder="Search..." (input)="onSearch($event)" class="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-md text-white focus:outline-none h-10" />
    </div>
  </div>
</div>
<app-filter-weapon-popup [isOpen]="isFilterOpen()" (closePopup)="isFilterOpen.set(false)" (filterChange)="onFilterChange($event)"></app-filter-weapon-popup>
